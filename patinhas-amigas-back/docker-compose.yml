version: "3.9"

services:
  patinhas_database: 
    image: postgres
    container_name: patinhas_database
    restart: always
    ports: 
      - 5432:5432
    environment:
      - POSTGRES_USER=patinhas_db
      - POSTGRES_PASSWORD=patinhas_db
      - POSTGRES_DB=patinhas_database
    volumes:
      - pgdata:/data/postgres

  app:
    build: .
    container_name: patinhas_amigas
    restart: always
    ports: 
      - 3333:3333
    volumes: 
      - .:/usr/app
    links: 
      - patinhas_database
    depends_on:
      - patinhas_database



volumes:
  pgdata:
    driver: local
